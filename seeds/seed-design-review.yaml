          "description": "describe structure and why abstraction is warranted",
          "suggestedComponentStructure": "Root frame (HORIZONTAL, 16px gap) > [Image 48×48, radius 8] + [Content (VERTICAL, 4px gap) > [Title body.medium] + [Subtitle caption.regular]]"
        }
      ],
      "reviewerNotes": []
    }

  Write design-review-report.md:
    # Design Review Report
    **Project:** [inferred from screen names]
    **Screens reviewed:** N
    **Generated:** ISO8601
    **Overall score:** X/100

    ## Executive Summary
    ## Critical Issues (Errors)  [one subsection per error, grouped by screen]
    ## Warnings                  [table: Screen | Layer | Issue | Fix, per category]
    ## Suggestions               [bulleted list per category]
    ## Patterns to Componentise  [one subsection per pattern]
    ## Category Breakdown        [one paragraph per category]

constraints:
  - "Capture a screenshot for every screen BEFORE writing any checks for that screen — never skip the screenshot step"
  - "Never invent issues not supported by data in extracted JSON, tool call results, or screenshots"
  - "affectedValue must be the exact value found (hex string, pixel number) — not a description"
  - "Every error-severity check must have a non-empty exampleFix field"
  - "Cross-screen consistency checks must cite both screen IDs"
  - "Pattern entries require at least 2 occurrence screen IDs — never flag single-use elements as patterns"
  - "score must be computed from actual counts using the formula — not estimated"
  - "Review every screen in extracted-frames/index.json — do not skip any"
  - "Write both design-review.json and design-review-report.md before declaring completion"
  - "All file reads and writes must be scoped to the pipeline working directory"

acceptance_criteria:
  - "design-review.json is written and valid JSON"
  - "design-review-report.md is written with at minimum: # Design Review Report, ## Executive Summary, ## Critical Issues, ## Warnings, ## Patterns to Componentise, ## Category Breakdown sections"
  - "meta.screenshot_method records which capture method was used"
  - "Every screen from extracted-frames/index.json has at least one check entry in screens[]"
  - "Every check has: checkId, category, severity, message, location, affectedValue, expectedValue, recommendation"
  - "Every error-severity check has a non-empty exampleFix"
  - "summary.byCategory contains all 8 categories each with error/warning/suggestion counts"
  - "summary.score is computed from the formula and matches the counts in summary.byCategory"
  - "patterns[] is present (may be empty); every entry has occurrences >= 2 and a screenIds array"
  - "Contrast checks reference actual hex values from the layer data, not descriptions"
  - "Tap target checks only flag nodes tagged as interactive"
