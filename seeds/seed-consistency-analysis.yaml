goal: "Perform cross-screen consistency analysis across all extracted Figma frames — building a colour usage map, spacing histogram, typography audit, component drift analysis, icon audit, alignment check, and overall consistency score"

context: |
  The consistency-analyser runs all 7 analysis modules across every screen before
  writing any output. It produces quantitative data structures that measure how
  consistent the design system is in practice, not per-screen correctness.

  Inputs:
    - extracted-frames/index.json — index of all screens with paths to per-screen data files
    - figma-tokens.json — resolved token registry; ground truth for in-system values
    - component-manifest.json (if present) — intended component inventory for drift validation
    - Any additional *-manifest.json or component-library.json files in working directory

  For each screen in extracted-frames/index.json, also read the corresponding
  extracted-frames/[screen_id].json for full layer tree, fills, strokes, spacing,
  typography, and component instance data.

  Run all 7 modules across the complete screen set before computing scores.

  ─── MODULE 1: Colour Usage Map ────────────────────────────────────────────────

  - Parse every fills and strokes array in every layer across all screens
  - Normalise all colours to 6-digit uppercase hex; blend RGBA fills over white for
    comparison, record opacity separately
  - For each unique hex: count, screenIds, exact token match in figma-tokens.json,
    tokenName (null if unmatched)
  - Sort by count descending
  - No-token hex appearing 3+ times → warning; appearing 1–2 times → suggestion

  ─── MODULE 2: Spacing Histogram ────────────────────────────────────────────────

  - Collect all padding and gap values from auto-layout containers (NOT absolute x/y positions)
  - Build histogram: { value, count, inScale, tokenName }
  - Detect base spacing unit: GCD of top 3 most-common values (cap at 16); use
    figma-tokens.json spacing.base or spacing.xs directly if defined
  - Outlier threshold: value < 3 occurrences AND not in scale → suggestion
    value ≥ 5 occurrences AND not in scale → warning

  ─── MODULE 3: Typography Audit ─────────────────────────────────────────────────

  - Collect every unique {fontFamily, fontSize, fontWeight, lineHeightPx, letterSpacingPx}
    combination from text layers across all screens
  - For each spec: count, screenIds, inScale (matches named typography token), tokenName
  - Flags:
    > 8 distinct font sizes → warning (list all)
    > 3 distinct font families → warning
    Font family not in figma-tokens.json → error
    Font size not in scale, appearing 3+ times → warning; 1–2 times → suggestion
    Same semantic role (detected by layer name: title/heading/label/caption/body) using
      different specs across screens → warning

  ─── MODULE 4: Component Drift Analysis ─────────────────────────────────────────

  - Group all component instances by component name / key
  - Per group, identify drift (NOT expected variation):
    Fill overrides on sub-layers → drift
    Spacing overrides (padding/gap from component default) → drift
    Detached sub-instances (nested component swapped for different component) → drift
    Note: variant/size/state changes and text content changes are NOT drift
  - driftScore = instances_with_overrides / total_instances
    score > 0.3 → warning; score > 0.6 → error

  ─── MODULE 5: Icon Audit ──────────────────────────────────────────────────────

  - Identify icon layers by name pattern (icon-*, ic_*, Icon/*, component set "icon"/"Icon"/"ic")
    or VECTOR type with bounding box < 48×48
  - Determine icon family from layer/component name prefix
  - More than 1 icon family → warning (list which screens use which families)
  - Emoji characters as icons (Unicode emoji in text layers) → error

  ─── MODULE 6: Alignment Issues ─────────────────────────────────────────────────

  - Within auto-layout frames: check primaryAxisAlignItems / counterAxisAlignItems consistency
    across sibling frames with the same role
  - Within absolute-position frames: elements sharing a common edge axis but offset by >2px → warning
  - Text layers in same container with inconsistent alignment (no apparent hierarchy) → warning
  - Elements on an apparent grid but offset by 1–3px → suggestion

  ─── MODULE 7: Overall Consistency Score ────────────────────────────────────────

  overallConsistencyScore = clamp(1.0
    - (rogue_colour_count * 0.02)
    - (out_of_scale_spacing_count * 0.01)
    - (out_of_scale_font_count * 0.02)
    - (component_drift_warnings * 0.03)
    - (component_drift_errors * 0.05)
    - ((icon_family_count - 1) * 0.05)
    - (alignment_issue_count * 0.01)
  , 0, 1)

  ≥ 0.9 → excellent; 0.75–0.89 → acceptable; < 0.75 → remediation required before handoff

  ─── OUTPUT FILES ────────────────────────────────────────────────────────────────

  Write consistency-report.json:
