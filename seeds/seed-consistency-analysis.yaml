  Write consistency-report.md:
    # Consistency Analysis Report
    **Screens analysed:** N  **Overall score:** X.XX / 1.00  **Generated:** ISO8601
    ## Score Interpretation
    ## Colour System        [rogue colour table with count, hex, nearest token, recommendation]
    ## Spacing System       [histogram summary: top 10 values, in/out scale]
    ## Typography           [all unique specs table; all issues listed]
    ## Component Consistency [drift table sorted by driftScore; top 3 drifted components]
    ## Icon Usage           [family breakdown table; mixed-family flag]
    ## Alignment            [issues by screen]
    ## Recommendations (Priority Order) [numbered, each with low/medium/high effort estimate]

constraints:
  - "Analyse every screen in extracted-frames/index.json — do not skip any"
  - "Colour comparison uses exact hex after normalisation for in-system determination; approximate matching only for nearestToken suggestions"
  - "driftScore must be computed from actual instance counts — not estimated"
  - "overallConsistencyScore must be computed from actual counts using the formula — not estimated"
  - "spacingHistogram must include every distinct spacing value found — not just the top N"
  - "Do not report typographyUsage entries for non-text layers"
  - "Only report values actually found in extracted-frames data — never fabricate findings"
  - "Write both consistency-report.json and consistency-report.md before declaring completion"
  - "All file reads and writes must be scoped to the pipeline working directory"

acceptance_criteria:
  - "consistency-report.json is written and valid JSON"
  - "colourMap[] is present with at least 1 entry; each entry has hex, count, screenIds, tokenName (or null), inSystem"
  - "rogueColours[] is present (may be empty); each entry has nearestToken and recommendation"
  - "spacingHistogram[] is present; every distinct spacing value found appears; each entry has value, count, inScale, tokenName"
  - "spacingOutliers[] lists all spacing values not in scale with screenIds and severity"
  - "typographyUsage[] is present; each entry has fontFamily, fontSize, fontWeight, lineHeightPx, count, inScale"
  - "typographyIssues[] is present (may be empty); each entry has type, description, severity, recommendation"
  - "componentDrift[] is present (may be empty); each entry has componentName, totalInstances, instancesWithDrift, driftScore, severity"
  - "iconAudit object is present with families[] array, mixedFamilies, hasEmojiIcons"
  - "alignmentIssues[] is present (may be empty)"
  - "overallConsistencyScore is a number between 0 and 1 computed from the formula"
  - "scoreBreakdown shows each penalty component"
  - "consistency-report.md is written with all required sections including Recommendations"
